<p-dialog
    [modal]="true" 
    [(visible)]="showDialog" 
    [style]="{ width: '35rem' }"
    [closable]="false"
>
    <ng-template #header>
        <span class="p-dialog-title" data-pc-section="title">
            {{ 'HOME.WELCOME.NEW_KPI_DIALOG.HEADER' | translate }}
        </span>
    </ng-template>
    <form [formGroup]="newKPIForm" (ngSubmit)="onSubmit()">
        <div class="flex flex-column gap-3 p-2 mb-4">
            <p-floatlabel variant="on">
                <input type="text" pInputText id="kpiName" formControlName="kpiName" class="flex-auto p-2 w-full" autocomplete="off" />
                <label for="kpiName" class="font-semibold">{{ 'HOME.WELCOME.NEW_KPI_DIALOG.LABEL' | translate }}</label>
            </p-floatlabel>
            <div class="flex gap-3 flex-row">
                <p-floatlabel class="flex-1" variant="on">
                    <p-inputnumber 
                        mode="decimal" 
                        [minFractionDigits]="2" 
                        [maxFractionDigits]="5" 
                        id="kpiTargetValue" 
                        formControlName="kpiTargetValue" 
                        class="w-full" 
                        autocomplete="off"
                        [inputStyle]="{ padding: 'var(--spacing-xs)' }"
                    ></p-inputnumber>
                    <label for="kpiTargetValue" class="font-semibold">{{ 'HOME.WELCOME.NEW_KPI_DIALOG.VALUE_LABEL' | translate }}</label>
                </p-floatlabel>
                <p-floatlabel class="flex-1" variant="on">
                    <p-select 
                        id="kpiUnit" 
                        formControlName="kpiUnit" 
                        [options]="kpiUnitOptions" 
                        optionLabel="label" 
                        optionValue="value" 
                        class="w-full"
                        appendTo="body"
                    ></p-select>
                    <label for="kpiUnit" class="font-semibold">{{ 'HOME.DASHBOARD.ADD_NEW_KPI_DIALOG.UNIT_LABEL' | translate }}</label>
                </p-floatlabel>
            </div>
        </div>
        <div class="flex justify-content-end gap-2">
            <p-button label="{{ 'HOME.WELCOME.NEW_KPI_DIALOG.CANCEL_BUTTON' | translate }}" severity="secondary" (click)="onDialogClose()" />
            <p-button [disabled]="!newKPIForm.valid" type="submit" label="{{ 'HOME.WELCOME.NEW_KPI_DIALOG.ADD_BUTTON' | translate }}" />
        </div>
    </form>
</p-dialog>
