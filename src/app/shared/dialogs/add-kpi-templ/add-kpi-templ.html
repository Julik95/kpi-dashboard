<form [formGroup]="newKpiFG" (ngSubmit)="onSubmit()">
    <div class="flex flex-column gap-3 p-2 mb-4">
        <p-floatlabel variant="on">
            <p-multiselect 
                id="selectedKpis"
                [options]="((kpis$ | async) || [])" 
                optionLabel="name" 
                formControlName="selectedKpis" 
                class="w-full"
                filterBy="name" 
                [filter]="false"
                [showClear]="true"
                appendTo="body"
            >
            </p-multiselect>
            <label for="selectedKpis" class="font-semibold">{{ 'HOME.WELCOME.NEW_USER_DIALOG.SELECT_KPI' | translate }}</label>
        </p-floatlabel>
    </div>
    <div class="flex justify-content-end gap-2">
        <p-button label="{{ 'HOME.WELCOME.NEW_KPI_DIALOG.CANCEL_BUTTON' | translate }}" severity="secondary" (click)="onDialogClose()" />
        <p-button [disabled]="!newKpiFG.valid" type="submit" label="{{ 'HOME.DASHBOARD.KPI_VALUE_DIALOG.CONFIRM_BUTTON' | translate }}" />
  </div>
</form>
