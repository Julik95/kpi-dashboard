<p-dialog
    [modal]="true" 
    [(visible)]="showDialog" 
    [style]="{ width: '25rem' }"
    [closable]="false"
>
    <ng-template #header>
        <span class="p-dialog-title" data-pc-section="title">
            {{ 'HOME.WELCOME.NEW_USER_DIALOG.HEADER' | translate }}
        </span>
    </ng-template>
    <form [formGroup]="newUserForm" (ngSubmit)="onSubmit()">
        <div class="flex flex-column gap-3 p-2 mb-4">
            <div class="flex flex-row gap-2">
                <p-floatlabel variant="on">
                    <input type="text" pInputText id="userName" formControlName="userName" class="flex-auto p-2 w-full" autocomplete="off" />
                    <label for="userName" class="font-semibold">{{ 'HOME.WELCOME.NEW_USER_DIALOG.NAME_LABEL' | translate }}</label>
                </p-floatlabel>
                <p-floatlabel variant="on">
                    <input type="text" pInputText id="userSName" formControlName="userSName" class="flex-auto p-2 w-full" autocomplete="off" />
                    <label for="userSName" class="font-semibold">{{ 'HOME.WELCOME.NEW_USER_DIALOG.SNAME_LABEL' | translate }}</label>
                </p-floatlabel>
            </div>
            <p-floatlabel variant="on">
                <p-multiselect 
                    id="assignedKpis"
                    [options]="((kpis$ | async) || [])" 
                    optionLabel="name" 
                    formControlName="assignedKpis" 
                    class="w-full"
                    filterBy="name" 
                    [filter]="false"
                    [showClear]="true"
                    appendTo="body"
                >
                </p-multiselect>
                <label for="assignedKpis" class="font-semibold">{{ 'HOME.WELCOME.NEW_USER_DIALOG.SELECT_KPI' | translate }}</label>
            </p-floatlabel>
        </div>
        <div class="flex justify-content-end gap-2">
            <p-button label="{{ 'HOME.WELCOME.NEW_USER_DIALOG.CANCEL_BUTTON' | translate }}" severity="secondary" (click)="onDialogClose()" />
            <p-button [disabled]="!newUserForm.valid" type="submit" label="{{ 'HOME.WELCOME.NEW_USER_DIALOG.ADD_BUTTON' | translate }}" />
        </div>
    </form>
</p-dialog>
